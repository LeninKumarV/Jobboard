services:

  postgres:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lenin
      POSTGRES_DB: jobboard
      PGDATA: /data/postgres
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - postgres:/data/postgres
    networks:
      - backend
    restart: unless-stopped

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin4@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - backend
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_jobboard
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - backend
    restart: unless-stopped

  redis:
    container_name: redis_jobboard
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - backend
    restart: unless-stopped

  eureka-server:
    container_name: eureka-server
    image: leninkumar003/eureka-server
    ports:
      - "8761:8761"
    networks:
      - backend
    restart: unless-stopped

  company-service:
    container_name: company-service
    build:
      context: .
      dockerfile: Dockerfile    # ← fixed
    image: leninkumar003/company-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - eureka-server
      - rabbitmq
    networks:
      - backend
    restart: unless-stopped

  job-service:
    container_name: job-service
    build:
      context: ../jobms          # path to jobms folder
      dockerfile: Dockerfile
    image: leninkumar003/job-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - eureka-server
    networks:
      - backend
    restart: unless-stopped

  review-service:
    container_name: review-service
    build:
      context: ../reviewms       # path to reviewms folder
      dockerfile: Dockerfile
    image: leninkumar003/review-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - eureka-server
      - rabbitmq
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  postgres:
  pgadmin: