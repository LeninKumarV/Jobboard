review-service:
  url: http://localhost:8083
job-service:
  url: http://localhost:8082
company-service:
  url: http://localhost:8081

spring:
  application:
    name: job-service

  datasource:
    url: jdbc:postgresql://localhost:5432/jobdb?currentSchema=public
    username: postgres
    password: lenin
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Kolkata
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    time-zone: Asia/Kolkata

server:
  port: 8082

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/